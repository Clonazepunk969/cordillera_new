version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: cordillera-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  auth-service:
    build: ./cordillera-auth-service
    container_name: cordillera-auth-service
    restart: always
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cordillera_auth_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8083:8083"

  kpi-service:
    build: ./cordillera-kpi-service
    container_name: cordillera-kpi-service
    restart: always
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cordillera_kpi_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8082:8082"

  report-service:
    build: ./cordillera-report-service
    container_name: cordillera-report-service
    restart: always
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cordillera_report_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8081"

  bff:
    build: ./cordillera-bff
    container_name: cordillera-bff
    restart: always
    depends_on:
      - auth-service
      - kpi-service
      - report-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:8083/api/auth
      KPI_SERVICE_URL: http://kpi-service:8082/api/kpis
      REPORT_SERVICE_URL: http://report-service:8081/api/reports
    ports:
      - "8080:8080"

    frontend:
      build: ./cordillera-kpi-dashboard
      container_name: cordillera-kpi-dashboard
      restart: always
      depends_on:
        - bff
      ports:
        - "5173:80"

